name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check --workspace

      - name: Test
        run: cargo test --workspace --no-run

  sqlx-prepare:
    name: Regenerate .sqlx offline cache
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: workshop
          POSTGRES_PASSWORD: workshop_secret
          POSTGRES_DB: skill_workshop
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres

      - name: Run migrations
        run: cargo sqlx migrate run
        env:
          DATABASE_URL: postgres://workshop:workshop_secret@localhost:5432/skill_workshop

      - name: Regenerate offline cache
        run: cargo sqlx prepare --workspace
        env:
          DATABASE_URL: postgres://workshop:workshop_secret@localhost:5432/skill_workshop

      - name: Verify offline build
        run: cargo check --workspace
        env:
          SQLX_OFFLINE: "true"
