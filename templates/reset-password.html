<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Password Reset</title>
</head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
    <h2>Password Reset Request</h2>
    <p>You have requested to reset your password. Use the OTP code below:</p>
    <div style="font-size: 32px; font-weight: bold; text-align: center; padding: 20px; background: #f5f5f5; border-radius: 8px; letter-spacing: 8px;">
        {{ otp }}
    </div>
    <p>This code expires in <strong>5 minutes</strong>.</p>
    <p>If you did not request a password reset, please ignore this email and ensure your account is secure.</p>
    <hr>
    <p style="color: #666; font-size: 12px;">Skill Workshop Platform</p>
</body>
</html>
